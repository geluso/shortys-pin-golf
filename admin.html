<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — Shorty's Pin Golf</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div id="site-header"></div>

    <div id="login-panel">
      <form id="admin-login" class="admin-login">
        <div class="form-row">
          <label for="admin-password">Password</label>
          <input type="password" id="admin-password" name="password" maxlength="64" autocomplete="current-password" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Log in</button>
        </div>
      </form>
      <div id="login-message" class="message" hidden></div>
    </div>

    <div id="admin-panel" hidden>
      <div class="admin-toolbar">
        <button type="button" id="admin-logout" class="button">Log out</button>
      </div>
      <div id="admin-leaderboard"></div>
      <div id="admin-message" class="message" hidden></div>
      <div class="admin-footer">
        <button type="button" id="admin-clear-scores" class="button-danger admin-clear-btn">Clear all scores</button>
      </div>
    </div>
    <div id="site-footer" class="site-footer"></div>
  </main>

  <script src="js/header.js"></script>
  <script src="js/holes.js"></script>
  <script src="js/app.js?v=5"></script>
  <script src="js/admin.js?v=2"></script>
  <script>
    renderSiteHeader();
    initAdminPage();
  </script>
</body>
</html>
