<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entry — Shorty's Pin Golf</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1 id="entry-title">ENTRY</h1>
    <p class="subtitle">Shorty's Pin Golf</p>

    <nav>
      <a href="leaderboard">← Leaderboard</a>
      ·
      <a href="./">New entry</a>
    </nav>

    <p id="entry-meta" class="entry-meta"></p>

    <form id="score-form">
      <table>
        <thead>
          <tr>
            <th class="hole-num">Hole</th>
            <th>Hole Name</th>
            <th>Par</th>
            <th>Balls</th>
          </tr>
        </thead>
        <tbody id="holes-body"></tbody>
        <tfoot>
          <tr>
            <td colspan="3">Total</td>
            <td id="player-total">—</td>
          </tr>
        </tfoot>
      </table>

      <div class="form-row">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>

      <div class="form-row" id="edit-pin-row" hidden>
        <label for="editPin">PIN to save changes</label>
        <input type="password" id="editPin" name="editPin" inputmode="numeric" autocomplete="current-password">
        <small>This entry is PIN-protected.</small>
      </div>

      <div class="form-row">
        <label for="pin">New PIN (optional)</label>
        <input type="password" id="pin" name="pin" inputmode="numeric" autocomplete="new-password">
        <small>Leave blank to keep current PIN.</small>
      </div>

      <div class="form-row" id="remove-pin-row" hidden>
        <label><input type="checkbox" id="clearPin" name="clearPin"> Remove PIN protection</label>
      </div>

      <div class="form-actions">
        <button type="submit" class="primary">Save changes</button>
        <a href="leaderboard" class="button">Leaderboard</a>
      </div>

      <div id="message" class="message" hidden></div>
    </form>
  </main>

  <script src="js/holes.js"></script>
  <script src="js/score-input.js"></script>
  <script src="js/app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
      window.location.href = './';
    } else {
      loadEntry(id)
        .then((entry) => {
          document.getElementById('entry-title').textContent = entry.name.toUpperCase();
          document.getElementById('entry-meta').textContent =
            `Saved ${new Date(entry.updatedAt).toLocaleString()} · ${formatVsPar(entry.scores)}`;

          if (entry.pin) {
            document.getElementById('edit-pin-row').hidden = false;
            document.getElementById('remove-pin-row').hidden = false;
          }

          initEditForm({
            form: document.getElementById('score-form'),
            tbody: document.getElementById('holes-body'),
            messageEl: document.getElementById('message'),
            entry,
          });
        })
        .catch(() => {
          document.querySelector('.container').innerHTML =
            '<p class="empty-state">Entry not found. <a href="leaderboard">Back to leaderboard</a></p>';
        });
    }
  </script>
</body>
</html>
