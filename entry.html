<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entry — Shorty's Pin Golf</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div id="site-header"></div>

    <p id="entry-meta" class="entry-meta"></p>

    <form id="score-form">
      <table>
        <thead>
          <tr>
            <th class="hole-num">Hole</th>
            <th>Hole Name</th>
            <th>Par</th>
            <th>Balls</th>
          </tr>
        </thead>
        <tbody id="holes-body"></tbody>
        <tfoot>
          <tr>
            <td colspan="2" class="total-label">Total</td>
            <td>Par 28</td>
            <td id="player-total">—</td>
          </tr>
        </tfoot>
      </table>

      <div class="form-row">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" maxlength="64" required>
      </div>

      <div class="form-row" id="edit-pin-row" hidden>
        <label for="editPin">PIN to save changes</label>
        <input type="password" id="editPin" name="editPin" inputmode="numeric" maxlength="32" autocomplete="current-password">
        <small>This entry is PIN-protected.</small>
      </div>

      <div class="form-actions">
        <button type="submit" class="primary">Save changes</button>
        <a href="leaderboard/index.php" class="button">Leaderboard</a>
      </div>

      <div id="message" class="message" hidden></div>
    </form>
  </main>

  <script src="js/header.js"></script>
  <script src="js/holes.js"></script>
  <script src="js/score-input.js"></script>
  <script src="js/input-guard.js"></script>
  <script src="js/app.js"></script>
  <script>
    renderSiteHeader();

    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id || !isValidEntryId(id)) {
      window.location.href = 'play/index.php';
    } else {
      loadEntry(id)
        .then((entry) => {
          document.getElementById('entry-meta').textContent =
            `${entry.name} · saved ${new Date(entry.updatedAt).toLocaleString()} · ${formatVsPar(entry.scores)} balls`;

          if (entry.pin) {
            document.getElementById('edit-pin-row').hidden = false;
          }

          initEditForm({
            form: document.getElementById('score-form'),
            tbody: document.getElementById('holes-body'),
            messageEl: document.getElementById('message'),
            entry,
          });
        })
        .catch(() => {
          const container = document.querySelector('.container');
          container.replaceChildren();
          const p = document.createElement('p');
          p.className = 'empty-state';
          p.textContent = 'Entry not found. ';
          const a = document.createElement('a');
          a.href = 'leaderboard/index.php';
          a.textContent = 'Back to leaderboard';
          p.appendChild(a);
          container.appendChild(p);
        });
    }
  </script>
</body>
</html>
