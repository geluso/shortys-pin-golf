<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#f0e8d0"/>
  <!-- green -->
  <rect x="2" y="10" width="12" height="1" fill="#2d8a3e"/>
  <rect x="1" y="11" width="14" height="1" fill="#2d8a3e"/>
  <rect x="0" y="12" width="16" height="4" fill="#2d8a3e"/>
  <!-- golf hole -->
  <rect x="3" y="10" width="1" height="1" fill="#000"/>
  <rect x="2" y="11" width="3" height="1" fill="#000"/>
  <rect x="3" y="12" width="1" height="1" fill="#000"/>
  <!-- red flag (pole + > triangle, drawn before ball) -->
  <rect x="3" y="1" width="1" height="9" fill="#c62828"/>
  <rect x="4" y="1" width="5" height="1" fill="#c62828"/>
  <rect x="4" y="2" width="6" height="1" fill="#c62828"/>
  <rect x="4" y="3" width="7" height="1" fill="#c62828"/>
  <rect x="4" y="4" width="8" height="1" fill="#c62828"/>
  <rect x="4" y="5" width="7" height="1" fill="#c62828"/>
  <rect x="4" y="6" width="6" height="1" fill="#c62828"/>
  <rect x="4" y="7" width="5" height="1" fill="#c62828"/>
  <!-- silver pinball (on top) -->
  <rect x="7" y="7" width="3" height="1" fill="#b0b0b0"/>
  <rect x="6" y="8" width="5" height="1" fill="#b0b0b0"/>
  <rect x="6" y="9" width="5" height="1" fill="#b0b0b0"/>
  <rect x="6" y="10" width="5" height="1" fill="#b0b0b0"/>
  <rect x="7" y="11" width="3" height="1" fill="#b0b0b0"/>
</svg>
