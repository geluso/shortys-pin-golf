<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaderboard — Shorty's Pin Golf</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <h1>LEADERBOARD</h1>
    <p class="subtitle">Shorty's Pin Golf</p>

    <nav><a href="./">← Enter scores</a></nav>

    <div id="leaderboard"></div>
  </main>

  <script src="js/holes.js"></script>
  <script src="js/app.js"></script>
  <script>
    loadLeaderboard(document.getElementById('leaderboard')).catch(() => {
      document.getElementById('leaderboard').innerHTML =
        '<p class="empty-state">Could not load scores.</p>';
    });
  </script>
</body>
</html>
