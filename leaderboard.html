<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaderboard — Shorty's Pin Golf</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div id="site-header"></div>

    <div class="home-play-wrap">
      <a href="play" class="button button-play">PLAY</a>
    </div>

    <div id="leaderboard"></div>
    <div id="site-footer" class="site-footer"></div>
  </main>

  <script src="js/header.js"></script>
  <script src="js/holes.js"></script>
  <script src="js/app.js?v=5"></script>
  <script>
    renderSiteHeader();
    const highlightId = new URLSearchParams(window.location.search).get('highlight');
    loadLeaderboard(document.getElementById('leaderboard'), {
      highlightId: isValidEntryId(highlightId) ? highlightId : null,
    }).catch(() => {
      document.getElementById('leaderboard').innerHTML =
        '<p class="empty-state">Could not load scores.</p>';
    });
  </script>
</body>
</html>
