<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Play — Shorty's Pin Golf</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="container">
    <div id="site-header"></div>

    <form id="score-form">
      <table>
        <thead>
          <tr>
            <th class="hole-num">Hole</th>
            <th>Hole Name</th>
            <th>Par</th>
            <th>Balls</th>
          </tr>
        </thead>
        <tbody id="holes-body"></tbody>
        <tfoot>
          <tr>
            <td colspan="2" class="total-label">Total</td>
            <td>Par 28</td>
            <td id="player-total">—</td>
          </tr>
        </tfoot>
      </table>

      <div class="form-row">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" maxlength="64" required>
      </div>

      <div class="form-row">
        <label for="pin">PIN (optional)</label>
        <input type="password" id="pin" name="pin" maxlength="32" autocomplete="new-password">
        <small>Set a PIN to prevent other people from updating your scores.</small>
      </div>

      <div class="form-actions">
        <button type="submit" class="primary">Save</button>
      </div>

      <div id="message" class="message" hidden></div>
    </form>
    <div id="site-footer" class="site-footer"></div>
  </main>

  <script src="js/header.js"></script>
  <script src="js/holes.js"></script>
  <script src="js/score-input.js"></script>
  <script src="js/input-guard.js"></script>
  <script src="js/draft.js?v=2"></script>
  <script src="js/app.js?v=6"></script>
  <script>
    renderSiteHeader();
    initScoreForm({
      form: document.getElementById('score-form'),
      tbody: document.getElementById('holes-body'),
      messageEl: document.getElementById('message'),
    });
  </script>
</body>
</html>
